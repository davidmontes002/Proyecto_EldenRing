<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivos de Ofnir | Forja tu Build</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo"><a href="bienvenida.html" style="color: inherit; text-decoration: none;">Archivos de Ofnir</a>
        </div>

        <nav>
            <ul>
                <li><a href="builds.html">Builds</a></li>
                <li><a href="personajes.html">Personajes</a></li>
                <li><a href="objetos.html">Objetos</a></li>
                <li><a href="teorias.html">Teorías</a></li>
            </ul>
        </nav>

        <div class="auth-buttons">
            <span style="color: var(--color-4); margin-right: 1rem; font-size: 0.95rem;">Viajero:
                <strong>LetMeSoloHer</strong></span>
            <a href="index.html" class="btn btn-login"
                style="border-color: rgba(255,0,0,0.3); color: #ff6b6b;">Salir</a>
        </div>
    </header>

    <main style="max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem;">
        <h1 class="page-title">Forja tu Build</h1>

        <div style="display: grid; grid-template-columns: 1fr 2.5fr; gap: 2rem;">
            <aside class="nav-card" style="padding: 2rem; text-align: left;">
                <h2 style="font-size: 1.4rem; border-bottom: 1px solid rgba(178,166,108,0.2); padding-bottom: 1rem;">
                    Atributos</h2>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>Vigor</label>
                    <input type="number" class="form-input" value="10" min="1" max="99">
                </div>
                <div class="form-group">
                    <label>Mente</label>
                    <input type="number" class="form-input" value="10" min="1" max="99">
                </div>
                <div class="form-group">
                    <label>Aguante</label>
                    <input type="number" class="form-input" value="10" min="1" max="99">
                </div>
                <div class="form-group">
                    <label>Fuerza</label>
                    <input type="number" class="form-input" value="10" min="1" max="99">
                </div>
                <div class="form-group">
                    <label>Destreza</label>
                    <input type="number" class="form-input" value="10" min="1" max="99">
                </div>
            </aside>

            <section class="nav-card" style="padding: 2rem; text-align: left;">
                <h2 style="font-size: 1.4rem; border-bottom: 1px solid rgba(178,166,108,0.2); padding-bottom: 1rem;">
                    Equipamiento</h2>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                    <div>
                        <div class="form-group">
                            <label>Mano Derecha 1 (Arma Principal)</label>
                            <select class="form-input">
                                <option>Selecciona un arma...</option>
                                <option>Espadón de la Luna Oscura</option>
                                <option>Ríos de Sangre</option>
                                <option>Uchigatana</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>Cabeza (Armadura)</label>
                            <select class="form-input">
                                <option>Selecciona un casco...</option>
                                <option>Máscara de Lágrimas de Plata</option>
                                <option>Yelmo de Radahn</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 2rem;">
                    <button type="button" class="nav-btn">Guardar Build</button>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 LoreRing - Sin fines de lucro. Elden Ring es propiedad de Bandai Namco y FromSoftware.</p>
    </footer>
</body>

</html>
