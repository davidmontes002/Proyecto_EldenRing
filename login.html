<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivos de Ofnir | Iniciar Sesión</title>

</head>

<body>
    <header>
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Archivos de Ofnir</a>
        </div>
        <div class="auth-buttons">
            <a href="login.html" class="btn btn-login">Login</a>
            <a href="registro.html" class="btn btn-register">Registro</a>
        </div>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 2rem;">
        <div class="nav-card" style="width: 100%; max-width: 450px;">
            <span class="badge" style="position: static; display: inline-block;">Acceso</span>
            <h2 style="margin-top: 1rem;">Iniciar Sesión</h2>
            <form>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" class="form-input" placeholder="sinluz@tierra.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" class="form-input" placeholder="••••••••">
                </div>
                <button type="button" class="nav-btn" style="width: 100%; margin-top: 1rem;">Entrar al Nexo</button>
            </form>
        </div>
    </main>

    </footer>
