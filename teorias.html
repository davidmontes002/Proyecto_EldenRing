<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivos de Ofnir | Archivo de Teorías</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo"><a href="bienvenida.html" style="color: inherit; text-decoration: none;">Archivos de Ofnir</a>
        </div>

        <nav>
            <ul>
                <li><a href="builds.html">Builds</a></li>
                <li><a href="personajes.html">Personajes</a></li>
                <li><a href="objetos.html">Objetos</a></li>
                <li><a href="teorias.html">Teorías</a></li>
            </ul>
        </nav>

        <div class="auth-buttons">
            <span style="color: var(--color-4); margin-right: 1rem; font-size: 0.95rem;">Viajero:
                <strong>LetMeSoloHer</strong></span>
            <a href="index.html" class="btn btn-login"
                style="border-color: rgba(255,0,0,0.3); color: #ff6b6b;">Salir</a>
        </div>
    </header>

    <main style="max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem;">
        <h1 class="page-title">Archivo de Teorías</h1>

        <div class="nav-card" style="text-align: left; padding: 3rem;">
            <span class="badge" style="position: static; display: inline-block;">Nueva Entrada</span>
            <h2 style="margin-top: 1rem;">Redactar tu descubrimiento</h2>

            <form style="margin-top: 2rem;">
                <div class="form-group">
                    <label>Título de la Teoría</label>
                    <input type="text" class="form-input" placeholder="Ej. La verdadera identidad de Radagon">
                </div>

                <div class="form-group">
                    <label>Contenido</label>
                    <textarea class="form-input" rows="12" placeholder="Escribe aquí tu análisis de lore..."></textarea>
                </div>

                <div class="form-group">
                    <label>Etiquetas (Separadas por coma)</label>
                    <input type="text" class="form-input" placeholder="Lore, Orden Dorada, Marika">
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <button type="button" class="btn btn-login" style="margin-right: 1rem;">Guardar Borrador</button>
                    <button type="button" class="nav-btn">Publicar Teoría</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 LoreRing - Sin fines de lucro. Elden Ring es propiedad de Bandai Namco y FromSoftware.</p>
    </footer>
</body>

</html>
